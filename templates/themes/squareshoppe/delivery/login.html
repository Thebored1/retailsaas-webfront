{% extends theme_base_template %}
{% load static %}

{% block title %}Delivery Console — Login{% endblock %}

{% block content %}
    <div class="container-max mx-auto px-4 py-20">
      <div class="max-w-md mx-auto">
        <div class="text-center mb-10">
          <div class="w-20 h-20 bg-indigo-600 text-white flex items-center justify-center rounded-sm mx-auto mb-6 text-2xl">
              <i class="fas fa-truck"></i>
          </div>
          <h2 class="text-3xl font-extrabold text-gray-900 leading-tight">Delivery Console</h2>
          <p class="text-gray-500 mt-3 text-lg">Agent access only</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-sm text-sm font-bold bg-red-50 text-red-600 border border-red-100">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="space-y-6 bg-white p-10 rounded-sm shadow-xl border border-gray-100">
          {% csrf_token %}
          <div>
            <label for="id_username" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Agent ID" 
                   class="w-full border-2 border-gray-100 rounded-sm px-4 py-3 focus:ring-2 focus:ring-indigo-600 focus:outline-none bg-gray-50 transition-all" required />
          </div>
          <div>
            <label for="id_password" class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Password</label>
            <input type="password" name="password" id="id_password" placeholder="••••••••"
                   class="w-full border-2 border-gray-100 rounded-sm px-4 py-3 focus:ring-2 focus:ring-indigo-600 focus:outline-none bg-gray-50 transition-all" required />
          </div>
          <button type="submit" class="w-full px-8 py-4 bg-gray-900 text-white rounded-sm font-bold text-lg shadow-lg hover:bg-black transition-all">
            Secure Sign In
          </button>
        </form>
      </div>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
{% endblock %}
